name: Build macOS App

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: macos-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos-arm64:
    name: macOS arm64
    runs-on: macos-14
    timeout-minutes: 90

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Homebrew dependencies
        run: |
          brew install cmake pkg-config wxwidgets tbb dylibbundler

      - name: Restore FFmpeg cache
        uses: actions/cache@v4
        with:
          path: .deps/ffmpeg
          key: ffmpeg-macos-arm64-${{ hashFiles('cmake/deps/ffmpeg.cmake') }}

      - name: Restore OpenCV cache
        uses: actions/cache@v4
        with:
          path: .deps/opencv
          key: opencv-macos-arm64-${{ hashFiles('cmake/deps/opencv.cmake', 'cmake/deps/ffmpeg.cmake') }}

      - name: Build app bundle
        run: |
          chmod +x build_macos.sh
          ./build_macos.sh

      - name: Package app bundle
        run: |
          tar -czf dist/VideoSubFinder-macos-arm64.tar.gz -C dist VideoSubFinder.app

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoSubFinder-macos-arm64
          path: dist/VideoSubFinder-macos-arm64.tar.gz
          if-no-files-found: error
          retention-days: 14

      - name: Upload app to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_ASSET: dist/VideoSubFinder-macos-arm64.tar.gz
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$RELEASE_ASSET#VideoSubFinder macOS arm64" --clobber
          else
            gh release create "$RELEASE_TAG" "$RELEASE_ASSET#VideoSubFinder macOS arm64" \
              --verify-tag \
              --generate-notes \
              --title "VideoSubFinder $RELEASE_TAG"
          fi
