help_desc_app_about = Chương trình này được viết bởi Simeon Kosnitsky và phát hành theo: GNU General Public License phiên bản 2.0 (GPLv2);;Mục đích chính của chương trình là trích xuất chữ gắn cứng (hardsub) từ video.;;Chương trình có hai tính năng chính:;1) Tự động phát hiện các khung hình có chữ gắn cứng (hardsub) trong video và lưu thông tin mốc thời gian.;2) Tạo ảnh chữ đã được làm sạch nền, cho phép dùng các chương trình OCR (như FineReader, Subtitle Edit, Google Drive) để tạo phụ đề hoàn chỉnh với văn bản và thời gian gốc.
