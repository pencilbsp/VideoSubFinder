help_desc_hotkeys_for_video_box = Phím tắt khung video:;;Phím tắt cho bộ lọc màu:;Nhấn giữ phím 'U': hiển thị khung hình video gốc toàn màn hình.;Nhấn giữ phím 'R': hiển thị khung hình video đã lọc bởi;tất cả Bộ lọc màu trong chế độ "Chạy tìm kiếm" (mở rộng vùng pixel trong/viền).;Nhấn giữ phím 'T': hiển thị:;* - tất cả pixel thuộc Bộ lọc màu bên trong sẽ hiển thị màu 'đỏ';(pixel liên quan đến ký tự cần tìm);* - tất cả pixel thuộc Bộ lọc màu viền sẽ hiển thị màu 'xanh lá';(pixel liên quan đến viền ký tự cần tìm);* - tất cả pixel thuộc cả Bộ lọc màu bên trong và viền sẽ hiển thị màu 'vàng';(tốt nhất không có pixel màu vàng, nghĩa là không giao nhau);Nhấn giữ phím 'Y': hiển thị pixel thuộc;màu bên trong bằng màu gốc, các pixel khác màu đen (hoặc trắng).;Nhấn giữ phím 'I': hiển thị pixel thuộc;màu viền bằng màu gốc, các pixel khác màu đen (hoặc trắng).;;Phím tắt điều hướng video:;Nhấn 'Left', 'Right' hoặc dùng "Mouse Wheel" để chuyển đến khung hình trước/sau.;Nhấn 'Space' để phát hoặc tạm dừng video.;;Phím tắt đặt thời gian bắt đầu/kết thúc cho "Chạy tìm kiếm":;Dùng 'Ctrl+Z' để đặt thời gian bắt đầu;Dùng 'Ctrl+X' để đặt thời gian kết thúc
help_desc_hotkeys_for_image_box = Phím tắt khung ảnh:;Nhấn giữ phím 'U': hiển thị ảnh toàn màn hình.;Nhấn 'Left', 'Right' hoặc dùng "Mouse Wheel" để;đổi loại ảnh hiển thị do nút "Kiểm tra" tạo ra.
