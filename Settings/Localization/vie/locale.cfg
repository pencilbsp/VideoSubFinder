label_use_outline_filter_color = Dùng màu lọc viền (để tìm viền chữ);(Dùng 'Ctrl+Enter' để thêm dòng mới);(Nhấn giữ phím 'T'/'R'/'I'/'U' trong khung video để kiểm tra)
label_dL_color = dL mặc định cho màu lọc RGB và Lab
label_dA_color = dA mặc định cho màu lọc Lab
label_dB_color = dB mặc định cho màu lọc Lab
label_combine_to_single_cluster = Gộp thành một cụm;(có thể dùng khi một dòng có nhiều màu)

ssp_vision_ocr_group = Apple Vision OCR (xác minh văn bản lượt hai)
ssp_vision_ocr_enabled = Bật xác minh Vision OCR
ssp_vision_ocr_accurate = Dùng mức nhận dạng chính xác
ssp_vision_ocr_language_correction = Dùng sửa lỗi ngôn ngữ
ssp_vision_ocr_languages = Ngôn ngữ nhận dạng (BCP-47, phân tách bằng dấu phẩy)
ssp_vision_ocr_min_confidence = Độ tin cậy tối thiểu (0..1)
ssp_vision_ocr_min_text_height = Chiều cao chữ tối thiểu (0..1, 0=tự động)
